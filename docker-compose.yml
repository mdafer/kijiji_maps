# Add kijiji.localhost to hosts file: 127.0.0.1 kijiji.localhost
# In nginx reverse proxy, redirect to host.docker.internal, not localhost

services:
  kijiji_maps:
    build: ./app
    restart: always
    container_name: kijiji_maps
    env_file: .env
    ports:
      - "${LISTENER_PORT}:${LISTENER_PORT}"
    networks:
      - docker-network
    depends_on:
      - mongo
    volumes:
      - ./app:/usr/src/app
      - /usr/src/app/node_modules

  mongo:
    image: mongo:8
    container_name: mongo
    restart: always
    env_file: .env
    ports:
      - "${MONGO_PORT}:27017"
    networks:
      - docker-network
    volumes:
      - db-data:/data/db
      - ./docker-scripts/mongo-init.sh:/docker-entrypoint-initdb.d/mongo-init.sh

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    restart: always
    env_file: .env
    networks:
      - docker-network
    ports:
      - "${MONGO_EXPRESS_PORT}:8081"
    depends_on:
      - mongo

networks:
  docker-network:
    external: true
    name: docker-network

volumes:
  db-data:
